<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブラジル不動産ナビ - Comfy Style</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body style="overflow: hidden;"> <!-- Map UI shouldn't scroll the whole body -->
    <header class="navbar">
        <div class="logo">
            <i class="ph-fill ph-house-line"></i>
            <span>ブラジル不動産ナビ</span>
        </div>
        <div class="search-bar">
            <i class="ph ph-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="サンパウロのエリア、駅名、キーワードで検索" value="Paraibuna">
        </div>
        
        <!-- 検索カテゴリ（HOME'S風） -->
        <section class="category-tabs">
            <button class="cat-tab active" data-cat="all">すべて</button>
            <button class="cat-tab" data-cat="rent">借りる（賃貸）</button>
            <button class="cat-tab" data-cat="buy-apt">買う（マンション）</button>
            <button class="cat-tab" data-cat="buy-house">買う（一戸建て・土地）</button>
        </section>

        <div class="nav-actions">
            <select id="langSelect" class="styled-select" style="margin-right: 1rem; width: auto;">
                <option value="ja">日本語 (JA)</option>
                <option value="en">英語 (EN)</option>
                <option value="pt">Português (PT)</option>
            </select>
            <button class="btn-text">お気に入り</button>
            <button class="btn-primary">ログイン</button>
        </div>
    </header>

    <main class="split-layout">
        <div class="list-pane">
            <div class="results-header">
                <h2 id="resultTitle">Paraibunaの検索結果</h2>
                <div class="sort-dropdown">
                    <select id="sortSelect" class="styled-select">
                        <option value="relevance">おすすめ順</option>
                        <option value="price-asc">価格が安い順</option>
                        <option value="price-desc">価格が高い順</option>
                    </select>
                </div>
            </div>

            <!-- フィルター設定 -->
            <div class="filters-bar">
                <div class="filter-item">
                    <label class="filter-label">価格帯 (表示中の通貨)</label>
                    <div class="filter-inputs">
                        <input type="number" id="minPrice" placeholder="下限" class="styled-input">
                        <span>〜</span>
                        <input type="number" id="maxPrice" placeholder="上限" class="styled-input">
                    </div>
                </div>
                <div class="filter-item">
                    <label class="filter-label">間取り (寝室)</label>
                    <select id="bedFilter" class="styled-select">
                        <option value="any">こだわらない</option>
                        <option value="1">1部屋以上</option>
                        <option value="2">2部屋以上</option>
                        <option value="3">3部屋以上</option>
                        <option value="4">4部屋以上</option>
                    </select>
                </div>
                <button id="applyFiltersBtn" class="btn-primary" style="align-self: flex-end; margin-bottom: 2px;">絞り込む</button>
            </div>

            <div class="results-grid" id="resultsGrid">
                <!-- Cards will be dynamically injected here -->
            </div>
        </div>
        
        <!-- Map Pane -->
        <div class="map-pane">
            <div id="map"></div>
        </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- ローカルファイルを直接読み込むためJSとしてデータをロード -->
    <script src="data/data.js" onerror="console.error('data.jsが見つかりません。スクレイパーを実行してください。')"></script>
    <script src="app.js"></script>
</body>
</html>
